    html, body {

      background: transparent;

    .container {

    .loading-container {

      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 1px;
      margin-bottom: 60px;
    }
    .cursor {
      display: inline-block;
      width: 4px;
      height: 72px;
      background-color: #74c7ec;
      margin-left: 4px;
      animation: blink 1s infinite;
      vertical-align: middle;
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
  </style>
</head>

      "Stream has ended…",
      "Goodbye…"
    ];

    const loadingText = document.getElementById('loading-text');
    let currentIndex = 0;
    let charIndex = 0;
    let isDeleting = false;
    const typingSpeed = 80;
    const deletingSpeed = 40;
    const pauseTime = 2500;

    function typeWriter() {
      const currentText = loadingTexts[currentIndex];

      if (!isDeleting) {
        if (charIndex < currentText.length) {
          loadingText.textContent = currentText.substring(0, charIndex + 1);
          charIndex++;
          setTimeout(typeWriter, typingSpeed + Math.random() * 20);
        } else {
          setTimeout(() => {
            isDeleting = true;
            typeWriter();
          }, pauseTime);
        }
      } else {
        if (charIndex > 0) {
          loadingText.textContent = currentText.substring(0, charIndex - 1);
          charIndex--;
          setTimeout(typeWriter, deletingSpeed);
        } else {
          isDeleting = false;
          currentIndex = Math.floor(Math.random() * loadingTexts.length);
          setTimeout(typeWriter, 200);
        }
      }
    }

    typeWriter();
  </script>
